function correctVoice(text) {
  let result = text.toLowerCase();
  Object.entries(VOICE_CORRECTIONS).forEach(([wrong, right]) => {
    result = result.replace(new RegExp(wrong, 'gi'), right);
  });
  return result.charAt(0).toUpperCase() + result.slice(1);
}

function importTelePAC(xmlContent, parcelles, setParcelles, userId, supabase, showSave, loadData){
  try{
    const parser=new DOMParser();
    const doc=parser.parseFromString(xmlContent,"text/xml");
    
    // Try different XML structures from TelePAC
    let ilots=doc.querySelectorAll("ilot, Ilot, ILOT, parcelle, Parcelle");
    
    if(ilots.length===0){
      // Try alternative structure
      ilots=doc.querySelectorAll("[numero_ilot], [NUM_ILOT], [numIlot]");
    }
    
    if(ilots.length===0){
      alert("Format XML non reconnu. Assurez-vous d'exporter depuis TéléPAC au format XML standard.");
      return;
    }
    
    const nouvelles=[];
    ilots.forEach(ilot=>{
      const getVal=(names)=>{for(const n of names){const el=ilot.querySelector(n)||ilot.getAttribute(n.toLowerCase());if(el){return typeof el==="string"?el:el.textContent||"";}}return"";};
      const nom=getVal(["libelle","Libelle","LIBELLE","nom_ilot","NOM_ILOT","lib_ilot"])||"Parcelle";
      const numero=getVal(["numero","Numero","NUMERO","num_ilot","NUM_ILOT","numero_ilot"])||"";
      const surface=parseFloat(getVal(["surface","Surface","SURFACE","surf_ilot","SURF_ILOT"])||"0");
      const commune=getVal(["commune","Commune","COMMUNE","lib_commune","LIB_COMMUNE"])||"";
      
      // Get crops if available
      const culture=getVal(["culture","Culture","CULTURE","libelle_culture","code_culture"])||"";
      
      if(surface>0||numero){
        nouvelles.push({nom:nom||"Ilot "+numero,surface:surface||0,ilot:numero,commune,culture,user_id:userId});
      }
    });
    
    if(nouvelles.length===0){
      alert("Aucune parcelle trouvée dans le fichier XML. Vérifiez le format du fichier.");
      return;
    }
    
    // Insert all parcelles
    supabase.from("parcelles").insert(nouvelles).then(({error})=>{
      if(!error){
        loadData();
        showSave("✅ "+nouvelles.length+" parcelle(s) importée(s) depuis TéléPAC !");
        alert("✅ "+nouvelles.length+" parcelle(s) importée(s) avec succès depuis votre dossier PAC !");
      } else {
        alert("Erreur lors de l'import : "+error.message);
      }
    });
  }catch(e){
    alert("Erreur de lecture du fichier XML : "+e.message);
  }
}

function exportAllData(parcelles,interventions,certiphytos,assolements){
  const esc=v=>{if(v==null)return"";const s=String(v);return s.includes(",")||s.includes('"')||s.includes("\n")? '"'+s.replace(/"/g,'""')+'"':s;};
  const today=new Date().toLocaleDateString("fr-FR");
  
  let csv="";
  
  // PARCELLES
  csv+="=== PARCELLES ===\n";
  csv+="Nom,Surface (ha),Culture,N Ilot PAC,Commune\n";
  parcelles.forEach(p=>{csv+=esc(p.nom)+","+esc(p.surface)+","+esc(p.culture)+","+esc(p.ilot)+","+esc(p.commune)+"\n";});
  csv+="\n";
  
  // ASSOLEMENT
  csv+="=== ASSOLEMENT PAC ===\n";
  csv+="Campagne,Parcelle,N Ilot PAC,Culture,Surface (ha)\n";
  assolements.forEach(a=>{const p=parcelles.find(p=>p.id===a.parcelle_id);csv+=esc(a.annee)+","+esc(p?p.nom:"")+","+esc(p?p.ilot:"")+","+esc(a.culture)+","+esc(a.surface)+"\n";});
  csv+="\n";
  
  // REGISTRE TRAITEMENTS
  csv+="=== REGISTRE DES TRAITEMENTS PHYTOSANITAIRES ===\n";
  csv+="Date,Parcelle,N Ilot PAC,Produit,N AMM,Type cible,Dose,Unite,Surface traitee (ha),Operateur,Materiel,Conditions meteo,DAR (h),Justification\n";
  interventions.forEach(i=>{const p=parcelles.find(p=>p.id===i.parcelle_id);csv+=esc(i.date)+","+esc(p?p.nom:"")+","+esc(p?p.ilot:"")+","+esc(i.produit)+","+esc(i.numero_amm)+","+esc(i.cible)+","+esc(i.dose)+","+esc(i.unite)+","+esc(i.surface_traitee)+","+esc(i.operateur)+","+esc(i.materiel)+","+esc(i.meteo)+","+esc(i.delai_rentree)+","+esc(i.justification)+"\n";});
  csv+="\n";
  
  // CERTIPHYTOS
  csv+="=== CERTIPHYTOS ===\n";
  csv+="Titulaire,Type,N Certificat,Date obtention,Date expiration,Organisme,Notes\n";
  certiphytos.forEach(c=>{csv+=esc(c.titulaire)+","+esc(c.type)+","+esc(c.numero)+","+esc(c.date_obtention)+","+esc(c.date_expiration)+","+esc(c.organisme)+","+esc(c.notes)+"\n";});
  csv+="\n";
  
  csv+="Export FacilPhyto - "+today+" - Conforme Reglement UE 2023/564 - Conservation 5 ans obligatoire\n";
  
  // Download CSV
  const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="FacilPhyto_export_"+new Date().toISOString().split("T")[0]+".csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  // Also offer PDF version
  if(confirm("Fichier CSV telecharge ! Voulez-vous aussi generer un PDF imprimable ?")){
    printRegistre(interventions,parcelles);
  }
}

          <div style={{fontSize:24,fontWeight:"bold",color:"#d4a843",letterSpacing:1}}>FacilPhyto</div>
          <div style={{fontSize:12,color:"#8aaa6a",marginTop:4}}>par Facil'Gestion31</div>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:24}}>
          {[["login","Se connecter"],["signup","Créer un compte"]].map(([m,l])=>(
            <button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:"10px",border:"2px solid",borderColor:mode===m?"#1a3a1a":"#e0d8c8",borderRadius:8,background:mode===m?"#1a3a1a":"white",color:mode===m?"#d4a843":"#555",cursor:"pointer",fontFamily:"inherit",fontWeight:mode===m?"bold":"normal",fontSize:13}}>{l}</button>
          ))}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <label style={{display:"block",fontSize:12,fontWeight:"600",marginBottom:4,color:"#555"}}>Email</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="votre@email.com" style={IS}/>
          </div>
          <div>
            <label style={{display:"block",fontSize:12,fontWeight:"600",marginBottom:4,color:"#555"}}>Mot de passe</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" style={IS} onKeyDown={e=>e.key==="Enter"&&handle()}/>
          </div>
          {msg&&<div style={{background:msg.includes("✅")?"#e8f5e8":"#fdf0f0",border:`1px solid ${msg.includes("✅")?"#27ae60":"#c0392b"}`,borderRadius:8,padding:"10px 14px",fontSize:13,color:msg.includes("✅")?"#27ae60":"#c0392b"}}>{msg}</div>}
          <button onClick={handle} disabled={loading||!email||!pass} style={{background:loading?"#ccc":"#1a3a1a",color:"#d4a843",border:"none",borderRadius:10,padding:"13px",cursor:loading?"not-allowed":"pointer",fontFamily:"inherit",fontWeight:"bold",fontSize:15,marginTop:4}}>
            {loading?"Chargement...":(mode==="login"?"Se connecter →":"Créer mon compte →")}
          </button>
        </div>
        <div style={{marginTop:16,padding:"10px 14px",background:"#fdf0f0",border:"1px solid #e67e22",borderRadius:8,fontSize:12,color:"#c0392b",textAlign:"center",fontWeight:"600"}}>
          🧪 VERSION TEST — Application en cours de réalisation<br/>
          <span style={{fontWeight:"normal",color:"#e67e22"}}>Merci de votre participation au test bêta !</span>
        </div>
        <div style={{marginTop:10,padding:"10px 14px",background:"#fffbf0",borderRadius:8,fontSize:12,color:"#8a6a00",textAlign:"center"}}>
          🔒 Vos données sont privées et sécurisées.<br/>Chaque agriculteur accède uniquement à ses propres données.
        </div>
      </div>
    </div>
  );
}

// ── APP PRINCIPALE ──
function App(){
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("dashboard");
  const [parcelles,setParcelles]=useState([]);
  const [interventions,setInterventions]=useState([]);
  const [certiphytos,setCertiphytos]=useState([]);
  const [showFP,setShowFP]=useState(false);
  const [editingI,setEditingI]=useState(null);
  const [showFI,setShowFI]=useState(false);
  const [showFC,setShowFC]=useState(false);
  const [saveMsg,setSaveMsg]=useState("");
  const [annee,setAnnee]=useState(new Date().getFullYear().toString());

  const emptyI={parcelle_id:"",date:new Date().toISOString().split("T")[0],produit:"",numero_amm:"",dose:"",unite:"L/ha",cible:"Fongicide",stade:"",surface_traitee:"",operateur:"",materiel:"",meteo:"",delai_rentree:"",justification:"",culture_parcelle:""};
  const [fP,setFP]=useState({nom:"",surface:"",culture:"",ilot:"",commune:""});
  const [fI,setFI]=useState(emptyI);
  const [fC,setFC]=useState({titulaire:"",type:CERT_TYPES[0],numero:"",date_obtention:"",date_expiration:"",organisme:"",notes:""});

  const [dicteeOn,setDicteeOn]=useState(false);
  const [dicteeTexte,setDicteeTexte]=useState("");
  const [dicteeLoad,setDicteeLoad]=useState(false);
  const [dicteeRes,setDicteeRes]=useState(null);
  const dicteeRef=useRef(null);

  const [msgs,setMsgs]=useState([{role:"assistant",text:"Bonjour ! Je suis votre conseiller IA FacilPhyto. Posez-moi vos questions sur le registre, les Certiphytos ou la réglementation. 🌾"}]);
  const [chatIn,setChatIn]=useState("");
  const [chatLoad,setChatLoad]=useState(false);
  const [chatVoice,setChatVoice]=useState(false);
  const chatVRef=useRef(null);
  const chatEnd=useRef(null);

  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  // Auth
  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{setUser(session?.user||null);setLoading(false);});
    supabase.auth.onAuthStateChange((_,session)=>setUser(session?.user||null));
  },[]);

  // Charger données
  useEffect(()=>{if(user){loadData();loadStocks();}},[user]);

  const loadData=async()=>{
    const[{data:p},{data:i},{data:c}]=await Promise.all([
      supabase.from("parcelles").select("*").eq("user_id",user.id).order("created_at"),
      supabase.from("interventions").select("*").eq("user_id",user.id).order("date",{ascending:false}),
      supabase.from("certiphytos").select("*").eq("user_id",user.id).order("created_at"),
    ]);
    setParcelles(p||[]);setInterventions(i||[]);setCertiphytos(c||[]);
  };

  const showSave=(msg="✅ Enregistré !")=>{setSaveMsg(msg);setTimeout(()=>setSaveMsg(""),3000);};

  const addP=async()=>{
    if(!fP.nom||!fP.surface)return;
    const{error}=await supabase.from("parcelles").insert({...fP,surface:parseFloat(fP.surface),user_id:user.id});
    if(!error){await loadData();setFP({nom:"",surface:"",culture:"",ilot:"",commune:""});setShowFP(false);showSave();}
  };

  const updateI=async()=>{
    if(!editingI||!fI.parcelle_id||!fI.produit)return;
    // Get old intervention to calculate stock difference
    const oldIntervention=interventions.find(i=>i.id===editingI);
    const oldQte=(parseFloat(oldIntervention?.dose)||0)*(parseFloat(oldIntervention?.surface_traitee)||0);
    const newDose=parseFloat(fI.dose)||0;
    const newSurface=parseFloat(fI.surface_traitee)||0;
    const newQte=newDose*newSurface;
    const diff=newQte-oldQte; // Positive = more used, negative = less used
    
    const{error}=await supabase.from("interventions").update({
      parcelle_id:fI.parcelle_id,date:fI.date,produit:fI.produit,numero_amm:fI.numero_amm||"",
      dose:newDose,unite:fI.unite,cible:fI.cible,stade:fI.stade||"",surface_traitee:newSurface,
      operateur:fI.operateur||"",materiel:fI.materiel||"",meteo:fI.meteo||"",
      delai_rentree:fI.delai_rentree||"",justification:fI.justification||"",
      culture_parcelle:fI.culture_parcelle||""
    }).eq("id",editingI);
    
    if(!error){
      // Update stock if diff != 0
      if(diff!==0){
        const stockProduit=stocks.find(s=>s.produit.toLowerCase()===fI.produit.toLowerCase());
        if(stockProduit){
          const nouvelleQte=parseFloat(stockProduit.quantite_restante)-diff;
          await supabase.from("stocks_phyto").update({quantite_restante:nouvelleQte}).eq("id",stockProduit.id);
          await loadStocks();
        }
      }
      await loadData();setFI(emptyI);setShowFI(false);setEditingI(null);setDicteeTexte("");setDicteeRes(null);showSave("✅ Traitement modifié — stock mis à jour !");
    }
  };

  const startEditI=(intervention)=>{
    setFI({...intervention,dose:String(intervention.dose),surface_traitee:String(intervention.surface_traitee),delai_rentree:String(intervention.delai_rentree||"")});
    setEditingI(intervention.id);
    setShowFI(true);
    setDicteeTexte("");setDicteeRes(null);
    window.scrollTo({top:0,behavior:"smooth"});
  };

  const addI=async()=>{
    if(editingI) return updateI();
    if(!fI.parcelle_id||!fI.produit)return;
    const dose=parseFloat(fI.dose)||0;
    const surface=parseFloat(fI.surface_traitee)||0;
    const qteUtilisee=dose*surface;
    const{error}=await supabase.from("interventions").insert({
        parcelle_id:fI.parcelle_id,
        date:fI.date,
        produit:fI.produit,
        numero_amm:fI.numero_amm||"",
        dose,
        unite:fI.unite,
        cible:fI.cible,
        stade:fI.stade||"",
        surface_traitee:surface,
        operateur:fI.operateur||"",
        materiel:fI.materiel||"",
        meteo:fI.meteo||"",
        delai_rentree:fI.delai_rentree||"",
        justification:fI.justification||"",
        culture_parcelle:fI.culture_parcelle||"",
        user_id:user.id
      });
    if(!error){
      // Mise à jour automatique du stock
      const stockProduit=stocks.find(s=>s.produit.toLowerCase()===fI.produit.toLowerCase()&&parseFloat(s.quantite_restante)>0);
      if(stockProduit){
        const nouvelleQte=parseFloat(stockProduit.quantite_restante)-qteUtilisee; // Stock négatif autorisé
        await supabase.from("stocks_phyto").update({quantite_restante:nouvelleQte}).eq("id",stockProduit.id);
        await loadStocks();
        showSave(`✅ Traitement enregistré — Stock ${fI.produit} mis à jour : ${nouvelleQte.toFixed(1)} ${stockProduit.unite} restant(s)`);
      } else {
        // Créer automatiquement une entrée négative dans les stocks
        await supabase.from("stocks_phyto").insert({
          produit:fI.produit,
          numero_amm:fI.numero_amm||"",
          quantite_achetee:0,
          unite:fI.unite.replace("/ha",""),
          quantite_restante:-qteUtilisee,
          date_achat:fI.date,
          fournisseur:"⚠️ À régulariser",
          numero_lot:"",
          date_peremption:"",
          user_id:user.id
        });
        await loadStocks();
        showSave("✅ Traitement enregistré ! ⚠️ Stock "+fI.produit+" créé en négatif — pensez à régulariser votre entrée de stock");
      }
      // Mise à jour assolement si culture renseignée
      if(fI.culture_parcelle&&fI.parcelle_id){
        const anneeTraitement=fI.date?fI.date.split("-")[0]:new Date().getFullYear().toString();
        const assoExistant=assolements.find(a=>a.parcelle_id===fI.parcelle_id&&a.annee===anneeTraitement);
        if(!assoExistant){
          const parcelle=parcelles.find(p=>p.id===fI.parcelle_id);
          await supabase.from("assolements").insert({
            parcelle_id:fI.parcelle_id,
            annee:anneeTraitement,
            culture:fI.culture_parcelle,
            surface:parseFloat(fI.surface_traitee)||0,
            user_id:user.id
          });
          await loadAssolements();
        }
      }
      await loadData();setFI(emptyI);setShowFI(false);setDicteeTexte("");setDicteeRes(null);
    }
  };

  const addC=async()=>{
    if(!fC.titulaire||!fC.numero)return;
    const{error}=await supabase.from("certiphytos").insert({...fC,user_id:user.id});
    if(!error){await loadData();setFC({titulaire:"",type:CERT_TYPES[0],numero:"",date_obtention:"",date_expiration:"",organisme:"",notes:""});setShowFC(false);showSave();}
  };

  const delP=async(id)=>{
    if(!confirm("Supprimer cette parcelle ?"))return;
    // Delete related interventions first
    await supabase.from("interventions").delete().eq("parcelle_id",id);
    await supabase.from("assolements").delete().eq("parcelle_id",id);
    const{error}=await supabase.from("parcelles").delete().eq("id",id).eq("user_id",user.id);
    if(!error){await loadData();showSave("✅ Parcelle supprimée !");}
    else{alert("Impossible de supprimer : "+error.message);}
  };
  const delI=async(id)=>{await supabase.from("interventions").delete().eq("id",id);await loadData();};
  const delC=async(id)=>{await supabase.from("certiphytos").delete().eq("id",id);await loadData();};

  // Dictée
  const startDictee=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Utilisez Chrome.");return;}
    const r=new SR();r.lang="fr-FR";r.interimResults=false;
    r.onresult=async e=>{const t=e.results[0][0].transcript;setDicteeTexte(t);setDicteeOn(false);setDicteeLoad(true);
      try{
        const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:`Tu es un assistant agricole. L'agriculteur a dicté : "${t}"\nParcelles : ${JSON.stringify(parcelles.map(p=>({id:p.id,nom:p.nom})))}\nDate : ${new Date().toISOString().split("T")[0]}\nRéponds UNIQUEMENT en JSON valide sans markdown :\n{"parcelle_id":"","date":"","produit":"","numero_amm":"","dose":"","unite":"L/ha","cible":"Fongicide","stade":"","surface_traitee":"","operateur":"","materiel":"","meteo":"","delai_rentree":"","justification":"","confiance":"haute","champs_manquants":[]}`}]})});
        const d=await resp.json();
        const p=JSON.parse(d.content?.[0]?.text.replace(/```json|```/g,"").trim()||"{}");
        setDicteeRes(p);
        setFI(f=>({...f,...Object.fromEntries(Object.entries(p).filter(([k,v])=>v&&!["confiance","champs_manquants"].includes(k)).map(([k,v])=>[k,String(v)]))}));
      }catch{setDicteeRes({erreur:"Erreur d'analyse."});}
      setDicteeLoad(false);
    };
    r.onerror=()=>setDicteeOn(false);r.onend=()=>setDicteeOn(false);
    dicteeRef.current=r;r.start();setDicteeOn(true);setDicteeTexte("");setDicteeRes(null);
  };

  const sendChat=async()=>{
    const msg=chatIn.trim();if(!msg||chatLoad)return;
    setChatIn("");setMsgs(m=>[...m,{role:"user",text:msg}]);setChatLoad(true);
    try{
      const r=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"Tu es conseiller agricole expert en reglementation phytosanitaire française pour FacilPhyto. Reponds en français, pratique et concis.",messages:[...msgs.map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text})),{role:"user",content:msg}]})});
      if(!r.ok){throw new Error("HTTP "+r.status);}
      const d=await r.json();
      const aiText=d.content?.[0]?.text||"Désolé, erreur.";setMsgs(m=>[...m,{role:"assistant",text:aiText+"\n\n⚠️ *Vérifiez toujours ces informations sur e-phy.franceagrimer.fr avant toute décision.*"}]);
    }catch(e){setMsgs(m=>[...m,{role:"assistant",text:"⚠️ Le conseiller IA n'est pas disponible pour le moment. Pour toute question réglementaire, contactez votre Chambre d'Agriculture ou consultez e-phy.franceagrimer.fr"}]);}
    setChatLoad(false);
  };

  const startChatVoice=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;
    const r=new SR();r.lang="fr-FR";r.interimResults=false;
    r.onresult=e=>{setChatIn(e.results[0][0].transcript);setChatVoice(false);};
    r.onerror=()=>setChatVoice(false);r.onend=()=>setChatVoice(false);
    chatVRef.current=r;r.start();setChatVoice(true);
  };

  const today=new Date();
  const expSt=d=>{if(!d)return"unknown";const diff=Math.ceil((new Date(d)-today)/86400000);return diff<0?"expired":diff<=90?"warning":"ok";};
  const EC={expired:"#c0392b",warning:"#e67e22",ok:"#27ae60",unknown:"#999"};
  const EL={expired:"Expiré !",warning:"Expire bientôt",ok:"Valide",unknown:"—"};
  const nbAlerts=certiphytos.filter(c=>["expired","warning"].includes(expSt(c.date_expiration))).length;

  const annees=[...new Set(interventions.map(i=>i.date?.split("-")[0]).filter(Boolean))].sort((a,b)=>b-a);
  const interByAnnee=interventions.filter(i=>i.date?.startsWith(annee));

  const TABS=[["dashboard","📊","Tableau de bord"],["parcelles","🗺️","Parcelles"],["registre","📋","Registre phyto"],["archives","📅","Archives"],["assolement","🌱","Assolement"],["stocks","📦","Stocks phyto"],["dphy","📊","DPHY"],["certiphyto","🎓","Certiphyto"],["conseil","🤖","Conseiller IA"]];
  
  // Assolement state
  const [assolements,setAssolements]=useState([]);
  const [showFA,setShowFA]=useState(false);
  const [stocks,setStocks]=useState([]);
  const [showFS,setShowFS]=useState(false);
  const [editingStockId,setEditingStockId]=useState(null);
  const emptyS={produit:"",numero_amm:"",quantite_achetee:"",unite:"L",date_achat:"",fournisseur:"",numero_lot:"",date_peremption:"",quantite_restante:""};
  const [fS,setFS]=useState({produit:"",numero_amm:"",quantite_achetee:"",unite:"L",date_achat:new Date().toISOString().split("T")[0],fournisseur:"",numero_lot:"",date_peremption:"",quantite_restante:""});
  const [anneeAsso,setAnneeAsso]=useState(new Date().getFullYear().toString());
  const emptyA={parcelle_id:"",annee:new Date().getFullYear().toString(),culture:"",surface:""};
  const [fA,setFA]=useState(emptyA);

  useEffect(()=>{if(user)loadAssolements();},[user]);
  const loadStocks=async()=>{
    const{data}=await supabase.from("stocks_phyto").select("*").eq("user_id",user.id).order("date_achat",{ascending:false});
    setStocks(data||[]);
  };
  const addS=async()=>{
    if(!fS.produit||!fS.quantite_achetee){
      alert("Veuillez remplir le produit et la quantité achetée !");
      return;
    }
    const qteAchetee=parseFloat(fS.quantite_achetee)||0;
    
    if(editingStockId){
      // Régularisation — on met à jour la ligne négative existante
      const stockExistant=stocks.find(s=>s.id===editingStockId);
      const qteUtilisee=Math.abs(parseFloat(stockExistant?.quantite_restante)||0);
      const qteRestante=qteAchetee-qteUtilisee;
      
      await supabase.from("stocks_phyto").update({
        quantite_achetee:qteAchetee,
        quantite_restante:qteRestante,
        date_achat:fS.date_achat,
        fournisseur:fS.fournisseur||"",
        numero_lot:fS.numero_lot||"",
        date_peremption:fS.date_peremption||"",
        numero_amm:fS.numero_amm||""
      }).eq("id",editingStockId);
      
      setEditingStockId(null);
      showSave("✅ Stock "+fS.produit+" régularisé ! Restant : "+qteRestante.toFixed(1)+" "+fS.unite);
    } else {
      // Nouvelle entrée
      const qteDejaUtilisee=interventions
        .filter(i=>i.produit.toLowerCase()===fS.produit.toLowerCase())
        .reduce((sum,i)=>(sum+(parseFloat(i.dose)||0)*(parseFloat(i.surface_traitee)||0)),0);
      const qteRestante=fS.quantite_restante?parseFloat(fS.quantite_restante):qteAchetee-qteDejaUtilisee;
      
      const{error}=await supabase.from("stocks_phyto").insert({
        produit:fS.produit,numero_amm:fS.numero_amm||"",
        quantite_achetee:qteAchetee,unite:fS.unite,
        quantite_restante:qteRestante,
        date_achat:fS.date_achat,date_peremption:fS.date_peremption||"",
        fournisseur:fS.fournisseur||"",numero_lot:fS.numero_lot||"",
        user_id:user.id
      });
      if(error){alert("Erreur : "+error.message);return;}
      if(qteDejaUtilisee>0)showSave("✅ Stock enregistré ! Restant : "+qteRestante.toFixed(1)+" "+fS.unite);
      else showSave("✅ Stock enregistré !");
    }
    
    await loadStocks();
    setFS({produit:"",numero_amm:"",quantite_achetee:"",unite:"L",date_achat:new Date().toISOString().split("T")[0],fournisseur:"",numero_lot:"",date_peremption:"",quantite_restante:""});
    setShowFS(false);
  };

  const delS=const delS=async(id)=>{await supabase.from("stocks_phyto").delete().eq("id",id);await loadStocks();};
  const loadAssolements=async()=>{
    const{data}=await supabase.from("assolements").select("*").eq("user_id",user.id).order("annee",{ascending:false});
    setAssolements(data||[]);
  };
  const addA=async()=>{
    if(!fA.parcelle_id||!fA.culture||!fA.surface){
      alert("Veuillez remplir la parcelle, la culture et la surface !");
      return;
    }
    const{error}=await supabase.from("assolements").insert({
      parcelle_id:fA.parcelle_id,
      annee:fA.annee,
      culture:fA.culture,
      surface:parseFloat(fA.surface),
      user_id:user.id
    });
    if(!error){await loadAssolements();setFA(emptyA);setShowFA(false);showSave("✅ Assolement enregistré !");}
    else{alert("Erreur : "+error.message);}
  };
  const delA=async(id)=>{await supabase.from("assolements").delete().eq("id",id);await loadAssolements();};

  if(loading)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontSize:18,color:"#1a3a1a"}}>⟳ Chargement...</div>;
  if(!user)return <LoginScreen onLogin={setUser}/>;

  return(
    <div style={{fontFamily:"Georgia,serif",background:"#f5f0e8",minHeight:"100vh",color:"#2d2a22"}}>
      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}`}</style>

      {saveMsg&&<div style={{position:"fixed",top:16,right:16,background:"#27ae60",color:"white",padding:"12px 20px",borderRadius:10,fontWeight:"bold",fontSize:14,zIndex:999,boxShadow:"0 4px 12px rgba(0,0,0,.2)"}}>{saveMsg}</div>}

      <div style={{background:"#1a3a1a",padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,boxShadow:"0 2px 8px rgba(0,0,0,.3)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0"}}>
          <span style={{fontSize:24}}>🌾</span>
          <div><div style={{color:"#d4a843",fontWeight:"bold",fontSize:17,letterSpacing:1}}>FacilPhyto</div><div style={{color:"#8aaa6a",fontSize:10}}>par Facil'Gestion31</div></div>

            {showFS&&<div style={{background:"white",borderRadius:12,padding:20,marginBottom:18,border:"2px solid #8a4a1a",boxShadow:"0 4px 16px rgba(0,0,0,.1)"}}>

                  <thead><tr style={{background:"#1a3a1a",color:"#d4a843"}}>{["Date achat","Produit","N° AMM","Qté achetée","Qté utilisée","Qté restante","Fournisseur","N° lot","Péremption",""].map(h=><th key={h} style={{padding:"10px 12px",textAlign:"left",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>

                        </td>
                        <td style={{padding:"8px 12px"}}><button onClick={()=>delS(s.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#c0392b",fontSize:13}}>🗑</button></td>
                      </tr>;
                    })}
                  </tbody>
                </table>
              </div>}
            </div>
          </div>
        )}

        {/* DPHY */}
        {tab==="dphy"&&(
          <div>
            <h2 style={{color:"#1a3a1a",fontSize:20,marginBottom:16}}>📊 Bilan DPHY — Déclaration annuelle</h2>
            
            {/* Alerte date limite */}
            {new Date().getMonth()<5&&<div style={{background:"#fdf0f0",border:"2px solid #c0392b",borderRadius:10,padding:"12px 16px",marginBottom:16}}>
              <div style={{fontWeight:"bold",color:"#c0392b",fontSize:14}}>🚨 Date limite : 31 mai {new Date().getFullYear()}</div>
              <div style={{fontSize:12,color:"#888",marginTop:4}}>La déclaration DPHY doit être effectuée sur telepac.agriculture.gouv.fr avant le 31 mai.</div>
            </div>}
            
            <div style={{background:"#fffbf0",border:"1px solid #d4a843",borderRadius:8,padding:"12px 16px",marginBottom:16,fontSize:12,color:"#8a6a00"}}>
              📋 Ce bilan récapitule automatiquement tous vos traitements pour préparer votre déclaration DPHY sur TéléPAC.
              La déclaration finale doit être effectuée sur <strong>telepac.agriculture.gouv.fr</strong>
            </div>

            {/* Sélecteur année */}
            <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:13,fontWeight:"600",color:"#555"}}>Année :</span>
              {[...new Set(interventions.map(i=>i.date?.split("-")[0]).filter(Boolean))].sort((a,b)=>b-a).map(a=>(
                <button key={a} onClick={()=>setAnnee(a)} style={{background:annee===a?"#1a3a1a":"white",color:annee===a?"#d4a843":"#555",border:"2px solid",borderColor:annee===a?"#1a3a1a":"#e0d8c8",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontFamily:"inherit",fontWeight:annee===a?"bold":"normal",fontSize:13}}>{a}</button>
              ))}
              <button onClick={()=>{
                const interAnnee=interventions.filter(i=>i.date?.startsWith(annee));
                const produits={};
                interAnnee.forEach(i=>{
                  const key=i.produit+"_"+i.numero_amm;
                  if(!produits[key])produits[key]={produit:i.produit,numero_amm:i.numero_amm||"",qte_totale:0,surface_totale:0,unite:i.unite,nb_traitements:0};
                  produits[key].qte_totale+=(parseFloat(i.dose)||0)*(parseFloat(i.surface_traitee)||0);
                  produits[key].surface_totale+=parseFloat(i.surface_traitee)||0;
                  produits[key].nb_traitements++;
                });
                const rows=Object.values(produits);
                let csv="BILAN DPHY "+annee+" - "+SOCIETE.nom+"\n";
                csv+="Produit,N AMM,Quantite totale utilisee,Unite,Surface totale traitee (ha),Nb traitements\n";
                rows.forEach(r=>{csv+=r.produit+","+r.numero_amm+","+r.qte_totale.toFixed(2)+","+r.unite.replace("/ha","")+","+r.surface_totale.toFixed(2)+","+r.nb_traitements+"\n";});
                csv+="\nExporte le "+new Date().toLocaleDateString("fr-FR")+" - A saisir sur telepac.agriculture.gouv.fr";
                const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8;"});
                const url=URL.createObjectURL(blob);
                const a=document.createElement("a");
                a.href=url;a.download="DPHY_"+annee+"_"+SOCIETE.nom.replace(/[^a-z0-9]/gi,"_")+".csv";
                document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
              }} style={{background:"#2d6a2d",color:"white",border:"none",borderRadius:8,padding:"7px 16px",cursor:"pointer",fontFamily:"inherit",fontWeight:"bold",fontSize:12,marginLeft:"auto"}}>
                📥 Exporter CSV DPHY {annee}
              </button>
            </div>

            {/* Tableau récapitulatif */}
            {(()=>{
              const interAnnee=interventions.filter(i=>i.date?.startsWith(annee));
              if(interAnnee.length===0)return <div style={{background:"white",borderRadius:12,padding:36,textAlign:"center",color:"#aaa"}}>Aucun traitement enregistré pour {annee}</div>;
              
              const produits={};
              interAnnee.forEach(i=>{
                const key=i.produit+"_"+(i.numero_amm||"");
                if(!produits[key])produits[key]={produit:i.produit,numero_amm:i.numero_amm||"—",qte_totale:0,surface_totale:0,unite:i.unite,nb_traitements:0,cible:i.cible};
                produits[key].qte_totale+=(parseFloat(i.dose)||0)*(parseFloat(i.surface_traitee)||0);
                produits[key].surface_totale+=parseFloat(i.surface_traitee)||0;
                produits[key].nb_traitements++;
              });
              const rows=Object.values(produits);
              
              return(
                <div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:16}}>
                    {[
                      {l:"Traitements",v:interAnnee.length,i:"🧴",c:"#8a4a1a"},
                      {l:"Produits différents",v:rows.length,i:"🌿",c:"#2d6a2d"},
                      {l:"Surface totale",v:Math.max(...rows.map(r=>r.surface_totale)).toFixed(1)+" ha",i:"🗺️",c:"#1a5a8a"},
                    ].map(c=>(
                      <div key={c.l} style={{background:"white",borderRadius:10,padding:"14px 16px",borderLeft:`4px solid ${c.c}`,boxShadow:"0 2px 8px rgba(0,0,0,.08)"}}>
                        <div style={{fontSize:20,marginBottom:4}}>{c.i}</div>
                        <div style={{fontSize:18,fontWeight:"bold",color:c.c}}>{c.v}</div>
                        <div style={{fontSize:11,color:"#666"}}>{c.l}</div>
                      </div>
                    ))}
                  </div>
                  
                  <div style={{background:"white",borderRadius:12,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,.08)"}}>
                    <div style={{padding:"12px 16px",background:"#1a3a1a",color:"#d4a843",fontWeight:"bold",fontSize:14}}>
                      Récapitulatif produits — Campagne {annee}
                    </div>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                        <thead><tr style={{background:"#f5f0e8"}}>{["Produit","N° AMM","Type","Qté totale utilisée","Surface totale","Nb traitements"].map(h=><th key={h} style={{padding:"10px 14px",textAlign:"left",color:"#555",fontWeight:"600",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                        <tbody>
                          {rows.map((r,idx)=>(
                            <tr key={r.produit} style={{background:idx%2===0?"#faf8f4":"white",borderBottom:"1px solid #f0ebe0"}}>
                              <td style={{padding:"10px 14px",fontWeight:"600",color:"#8a4a1a"}}>{r.produit}</td>
                              <td style={{padding:"10px 14px",fontFamily:"monospace",fontSize:11}}>{r.numero_amm}</td>
                              <td style={{padding:"10px 14px"}}><span style={{background:r.cible==="Fongicide"?"#e8f5e8":r.cible==="Herbicide"?"#fff3e0":"#fce4ec",padding:"2px 8px",borderRadius:10,fontSize:11}}>{r.cible}</span></td>
                              <td style={{padding:"10px 14px",fontWeight:"bold",color:"#1a3a1a"}}>{r.qte_totale.toFixed(2)} {r.unite.replace("/ha","")}</td>
                              <td style={{padding:"10px 14px"}}>{r.surface_totale.toFixed(1)} ha</td>
                              <td style={{padding:"10px 14px",textAlign:"center"}}><span style={{background:"#e8f5e8",color:"#2d6a2d",borderRadius:20,padding:"2px 10px",fontWeight:"bold"}}>{r.nb_traitements}</span></td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                    <div style={{padding:"10px 14px",background:"#f5f0e8",fontSize:11,color:"#888"}}>
                      ⚠️ Ces données sont à déclarer sur <strong>telepac.agriculture.gouv.fr</strong> avant le 31/05/{annee+1} · Déclaration DPHY obligatoire
                    </div>
                  </div>
                </div>
              );
            })()}
          </div>
        )}

        {/* CERTIPHYTO */}
        {tab==="certiphyto"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <h2 style={{color:"#1a3a1a",fontSize:20,margin:0}}>🎓 Gestion des Certiphytos</h2>
              <button onClick={()=>setShowFC(!showFC)} style={{background:"#6a2d8a",color:"white",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontFamily:"inherit",fontWeight:"bold",fontSize:13}}>+ Ajouter</button>
            </div>
            <div style={{background:"#f0eaf8",border:"1px solid #c8a8e8",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:12,color:"#5a2a7a"}}>
              <strong>ℹ️</strong> Renouvellement obligatoire tous les <strong>5 ans</strong>. Sans Certiphyto valide, l'achat et l'utilisation de phyto est illégal.
            </div>
            {showFC&&<div style={{background:"white",borderRadius:12,padding:20,marginBottom:18,border:"2px solid #6a2d8a",boxShadow:"0 4px 16px rgba(0,0,0,.1)"}}>
              <div style={{fontWeight:"bold",marginBottom:12,color:"#1a3a1a"}}>➕ Nouveau Certiphyto</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12}}>
                <FM label="Titulaire *" onVoice={v=>setFC(f=>({...f,titulaire:v}))}><input value={fC.titulaire} onChange={e=>setFC(f=>({...f,titulaire:e.target.value}))} style={{...IS,flex:1}}/></FM>
                <div><label style={{display:"block",fontSize:12,fontWeight:"600",marginBottom:4,color:"#555"}}>Type *</label><select value={fC.type} onChange={e=>setFC(f=>({...f,type:e.target.value}))} style={IS}>{CERT_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
                <FM label="N° certificat *" onVoice={v=>setFC(f=>({...f,numero:v}))}><input value={fC.numero} onChange={e=>setFC(f=>({...f,numero:e.target.value}))} style={{...IS,flex:1}}/></FM>
                <FM label="Organisme" onVoice={v=>setFC(f=>({...f,organisme:v}))}><input value={fC.organisme} onChange={e=>setFC(f=>({...f,organisme:e.target.value}))} style={{...IS,flex:1}}/></FM>
                <div><label style={{display:"block",fontSize:12,fontWeight:"600",marginBottom:4,color:"#555"}}>Date obtention</label><input type="date" value={fC.date_obtention} onChange={e=>setFC(f=>({...f,date_obtention:e.target.value}))} style={IS}/></div>
                <div><label style={{display:"block",fontSize:12,fontWeight:"600",marginBottom:4,color:"#555"}}>Date expiration *</label><input type="date" value={fC.date_expiration} onChange={e=>setFC(f=>({...f,date_expiration:e.target.value}))} style={IS}/></div>
                <div style={{gridColumn:"1/-1"}}><FM label="Notes" onVoice={v=>setFC(f=>({...f,notes:v}))}><textarea value={fC.notes} onChange={e=>setFC(f=>({...f,notes:e.target.value}))} rows={2} style={{...IS,flex:1,resize:"vertical"}}/></FM></div>
              </div>
              <div style={{display:"flex",gap:10,marginTop:12}}>
                <button onClick={addC} style={{background:"#6a2d8a",color:"white",border:"none",borderRadius:8,padding:"8px 20px",cursor:"pointer",fontFamily:"inherit",fontWeight:"bold"}}>✅ Enregistrer</button>
                <button onClick={()=>setShowFC(false)} style={{background:"#e8e0d0",color:"#555",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontFamily:"inherit"}}>Annuler</button>
              </div>
            </div>}
            {certiphytos.length===0&&<div style={{background:"white",borderRadius:12,padding:36,textAlign:"center",color:"#aaa"}}>Aucun Certiphyto enregistré.</div>}
            <div style={{display:"grid",gap:12}}>
              {certiphytos.map(c=>{
                const st=expSt(c.date_expiration);
                const dL=c.date_expiration?Math.ceil((new Date(c.date_expiration)-today)/86400000):null;
                return(<div key={c.id} style={{background:"white",borderRadius:12,padding:"16px 20px",boxShadow:"0 2px 8px rgba(0,0,0,.08)",borderLeft:`5px solid ${EC[st]}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                        <span style={{fontSize:26}}>🎓</span>
                        <div><div style={{fontWeight:"bold",fontSize:14}}>{c.titulaire}</div><div style={{color:"#6a2d8a",fontSize:11,fontWeight:"600"}}>{c.type}</div></div>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:4,fontSize:11,color:"#555"}}>
                        <div><strong>N° :</strong> {c.numero||"—"}</div>
                        <div><strong>Obtenu :</strong> {c.date_obtention||"—"}</div>
                        <div><strong>Organisme :</strong> {c.organisme||"—"}</div>
                      </div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                      <div style={{background:EC[st],color:"white",padding:"3px 10px",borderRadius:16,fontWeight:"bold",fontSize:11}}>{EL[st]}</div>
                      {dL!==null&&<div style={{fontSize:11,color:EC[st],fontWeight:"600",textAlign:"right"}}>{dL>=0?`Dans ${dL} jours`:`Expiré depuis ${Math.abs(dL)} j`}<div style={{fontWeight:"normal",color:"#888",fontSize:10}}>{c.date_expiration}</div></div>}
                      <button onClick={()=>delC(c.id)} style={{background:"none",border:"1px solid #eee",borderRadius:6,padding:"2px 8px",cursor:"pointer",fontSize:11,color:"#c0392b",fontFamily:"inherit"}}>🗑 Supprimer</button>
                    </div>
                  </div>
                  {st==="expired"&&<div style={{marginTop:8,background:"#fdf0f0",border:"1px solid #c0392b",borderRadius:8,padding:"6px 12px",fontSize:11,color:"#c0392b"}}>🚨 <strong>Certiphyto expiré !</strong> Contactez votre Chambre d'Agriculture.</div>}
                  {st==="warning"&&<div style={{marginTop:8,background:"#fff8f0",border:"1px solid #e67e22",borderRadius:8,padding:"6px 12px",fontSize:11,color:"#e67e22"}}>⚠️ Pensez à renouveler votre Certiphyto avant expiration.</div>}
                </div>);
              })}
            </div>
          </div>
        )}

        {/* CONSEIL IA */}
        {tab==="conseil"&&(
          <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 160px)"}}>
            <h2 style={{color:"#1a3a1a",fontSize:20,margin:"0 0 10px 0"}}>🤖 Conseiller IA FacilPhyto</h2>
            <div style={{background:"#fffbf0",border:"1px solid #d4a843",borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:11,color:"#8a6a00"}}>
              ⚠️ Conseils indicatifs. Ne remplace pas un conseiller agréé Certiphyto.
            </div>
            <div style={{flex:1,background:"white",borderRadius:12,padding:12,overflowY:"auto",boxShadow:"0 2px 8px rgba(0,0,0,.08)",marginBottom:8}}>
              {msgs.map((m,i)=>(
                <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:12}}>
                  {m.role==="assistant"&&<div style={{width:26,height:26,background:"#1a3a1a",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,marginRight:6,flexShrink:0,marginTop:2}}>🌾</div>}
                  <div style={{maxWidth:"78%",background:m.role==="user"?"#1a3a1a":"#f5f0e8",color:m.role==="user"?"white":"#2d2a22",borderRadius:m.role==="user"?"14px 14px 3px 14px":"14px 14px 14px 3px",padding:"9px 13px",fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{m.text}</div>
                </div>
              ))}
              {chatLoad&&<div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:26,height:26,background:"#1a3a1a",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>🌾</div><div style={{background:"#f5f0e8",borderRadius:14,padding:"8px 12px",color:"#888",fontSize:12}}>Analyse…</div></div>}
              <div ref={chatEnd}/>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
              {["Certiphytos valides ?","Obligations 2027","Vérifier conformité","Bilan DPHY"].map(q=>(
                <button key={q} onClick={()=>setChatIn(q)} style={{background:"#f0ebe0",border:"none",borderRadius:16,padding:"4px 10px",fontSize:11,cursor:"pointer",color:"#555",fontFamily:"inherit"}}>{q}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendChat()} placeholder="Écrivez ou utilisez le micro…" disabled={chatLoad}
                style={{flex:1,padding:"10px 13px",border:"2px solid #d4a843",borderRadius:10,fontFamily:"inherit",fontSize:13,background:"white",outline:"none"}}/>
              <button onClick={chatVoice?()=>{chatVRef.current?.stop();setChatVoice(false);}:startChatVoice}
                style={{background:chatVoice?"#c0392b":"#2d6a2d",color:"white",border:"none",borderRadius:10,padding:"10px 12px",cursor:"pointer",fontSize:16,animation:chatVoice?"pulse 1s infinite":"none"}}>
                {chatVoice?"⏹":"🎙"}
              </button>
              <button onClick={sendChat} disabled={chatLoad||!chatIn.trim()}
                style={{background:chatLoad?"#ccc":"#1a3a1a",color:"white",border:"none",borderRadius:10,padding:"10px 18px",cursor:chatLoad?"not-allowed":"pointer",fontFamily:"inherit",fontWeight:"bold",fontSize:14}}>→</button>
            </div>
            {chatVoice&&<div style={{textAlign:"center",color:"#c0392b",fontSize:11,marginTop:4,animation:"pulse 1s infinite"}}>🔴 Enregistrement… parlez maintenant</div>}
          </div>
        )}
      </div>

      <div style={{background:"#1a3a1a",color:"#8aaa6a",textAlign:"center",padding:"14px",fontSize:10,marginTop:30}}>
        FacilPhyto © {new Date().getFullYear()} — {SOCIETE.nom} · {SOCIETE.adresse} · SIRET {SOCIETE.siret} · <a href={`mailto:${SOCIETE.email}`} style={{color:"#d4a843"}}>{SOCIETE.email}</a>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
